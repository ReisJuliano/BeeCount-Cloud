services:
  beecount-cloud:
    # ⚠️ WhatsApp bot (evolution-api + beecount-whatsapp-bot abaixo): os 3 MCP
    # tools novos (get_account_balances / lookup_merchant_category /
    # set_merchant_category, ver docs/MCP.md) só existem em produção se essa
    # imagem for buildada a partir do Dockerfile local (`build: .`) — a
    # imagem publicada abaixo é a do upstream e não tem esse código. Troque
    # `image:` por `build: .` (ou publique sua própria imagem) antes de
    # depender do bot.
    image: sunxiao0721/beecount-cloud:latest
    restart: unless-stopped
    ports:
      - "8869:8080"
    volumes:
      - ./data:/data
    environment:
      # ===== 必填:JWT secret(改成你自己的 32+ 字节强随机串)=====
      # JWT_SECRET: change-me-please-32-bytes-strong-random

      # ===== AI 文档 Q&A(可选)=====
      # 配了就启用 ⌘K 「问 AI:xxx」(基于 BeeCount-Website 文档做 RAG)。
      # 不配也不影响其它功能 — 用户点「问 AI」时 fallback 到「跳官网搜文档」。
      #
      # 默认走 SiliconFlow + BAAI/bge-m3(免费 quota cover 几十万次问答)。
      # 注册 https://siliconflow.cn 拿 key 填到下面就行。
      #
      # 重要:这里的 EMBEDDING_MODEL 必须跟 BeeCount-Website 索引 build 时一致
      # (向量空间对齐),否则检索结果错乱。docker image 自带的 sqlite 是
      # BAAI/bge-m3 build 的,默认值不要动。
      #
      # 换其它 provider(OpenAI / 智谱 / 阿里 / Ollama 自托管 ...)需要重 build
      # Website 索引,见 .docs/web-cmdk-ai-doc-search.md。
      EMBEDDING_BASE_URL: https://api.siliconflow.cn/v1
      EMBEDDING_MODEL: BAAI/bge-m3
      EMBEDDING_API_KEY: ""  # ← 填你的 SiliconFlow key 启用 AI 文档 Q&A

      # ===== 汇率代理(多币种 MVP)=====
      # EXCHANGE_RATE_PROXY_ENABLED: "true"
      # EXCHANGE_RATE_CACHE_TTL_HOURS: "12"
      # 可选:整体替换上游为自托管 Frankfurter(http://host:8080)
      # EXCHANGE_RATE_UPSTREAM: ""

      # ===== 其它常用环境变量(详见 docs/DEPLOYMENT.md)=====
      # CORS_ORIGINS: "https://your-domain.com"
      # REGISTRATION_ENABLED: "false"
      # TOTP_ISSUER_NAME: "BeeCount"

  # ===== WhatsApp bot: OCR de comprovante -> lançamento no BeeCount =====
  # Ver ../BeeCount-WhatsApp-Bot/README.md pro passo a passo completo
  # (parear número, achar o JID do contato, criar o PAT).
  evolution-api:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    ports:
      - "8880:8080" # expõe só se for usar o Manager web pra parear via QR
    volumes:
      - evolution_data:/evolution/instances
    environment:
      AUTHENTICATION_API_KEY: change-me-strong-random # tem que bater com EVOLUTION_API_KEY do bot
      DATABASE_ENABLED: "false" # instância única, sem persistência multi-tenant — suficiente aqui

  beecount-whatsapp-bot:
    build: ../BeeCount-WhatsApp-Bot
    restart: unless-stopped
    depends_on:
      - beecount-cloud
      - evolution-api
    volumes:
      - whatsapp_bot_data:/data
    environment:
      BEECOUNT_BASE_URL: http://beecount-cloud:8080
      BEECOUNT_PAT: "" # bcmcp_... — criar em Web Console > Settings > Developer (mcp:read + mcp:write)
      EVOLUTION_BASE_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: change-me-strong-random # mesmo valor de AUTHENTICATION_API_KEY acima
      EVOLUTION_INSTANCE: beecount-bot
      CONTACT_JID: "5542991435778@s.whatsapp.net" # ver README do bot pra confirmar o JID exato
      STATE_FILE_PATH: /data/state.json

volumes:
  beecount_data:
  evolution_data:
  whatsapp_bot_data:
